<div id="search">
    <div id="sortby" class="float-right">
        <label>Sort by</label>
        <select id="sorting" (change)="search()">
            <option value="1">Latest</option>
            <option value="0">Oldest</option>
        </select>
    </div>
    <div style="clear: both;"></div>
</div>

<div class="list-container">
    <div class="count-result">Total <span class="count">{{listCount}}</span> script found</div>
    <div class="listing container-fluid">
        <div class="list-item row" *ngFor="let item of list; index as i">
            <div class="col-lg-11 col-md-12">
                <div><span>{{i+1}}</span></div>
                <div><img [src]="[item.fileId === undefined || item.fileId === null ? 'assets/img/no-thumbnail-file.png' : environment.feraApiPath + '/thumbnail/' + item.fileId]" /></div>
                <div>
                    <div>
                        <ng-container *ngFor="let bc of item.businessChannel">
                            <span class="entity">{{bc.value}}</span>
                        </ng-container>
                        <span class="language">{{item.language}}</span>
                        <span>{{item.fileExtension}}</span>
                    </div>
                    <span>{{item.title}}</span>
                    <span>{{item.description}}</span>
                </div>
            </div>
            <div class="col-lg-1 col-md-12">
                <div class="dropdown" *ngIf="!item.isArchived">
                    <a href="javascript:void(0);" id="item{{i+1}}" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <span class="fa fa-ellipsis-h"></span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-right" aria-labelledby="'item'+(i+1)">
                        <a [href]="environment.feraApiPath + '/file/' + item.fileId" download="{{item.fileName}}" class="dropdown-item">Download</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

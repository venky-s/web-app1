<div class="profile-notes">
    All profile created through this QR will display on your <b><span class="lnr lnr-user"></span>Prospect</b> section
</div>

<div id="profile" class="row">
    <div id="profile-qr" class="col-lg-6 col-md-12">
        <div>
            <span>Visit profile survey via QR</span>
            <div class="space1"></div>
            <div class="qr">
                <a [href]=userProfile?.QRImage64 download="qrid.png">
                    <img [src]=userProfile?.QRImage64 alt="avatar">
                    <div style="text-align: center; margin-top: 10px;">
                        <span class="lnr lnr-download" style="margin-right: 5px;"></span>Download
                    </div>
                </a>
            </div>
        </div>
    </div>
    <div id="profile-email" class="col-lg-6 col-md-12">
        <div>
            <div style="width: 80%; margin: 0 auto;">
                <span>Visit profile survey via link</span>
                <div class="space1"></div>
                <div class="form-group form-gap">
                    <span id="msgError" class="error-login" style="display:none;">{{sendQrMsg}}</span>
                    <input type="text" id="prospectEmail" name="prospectEmail" class="form-control" placeholder="Email address" [(ngModel)]="prospectEmail" />
                </div>
                <div class="btnMax">
                    <button class="btn btn-warning btn-login" style="width: 100px;" (click)="sendQR($event)">Send</button>
                </div>
            </div>
        </div>
    </div>
    <div id="profile-survey" class="col-lg-12 col-md-12">
        <div>
            <a [href]="userProfile?.QRUidUrl" class="btn btn-warning" target="_blank"><span class="lnr lnr-link"></span>Visit the profile survey here</a>
        </div>
    </div>
</div>

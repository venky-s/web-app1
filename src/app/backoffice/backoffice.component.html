<div class="wrapper">

    <aside id="sidebar">

        <a [routerLink]="['/backoffice']" class="navbar-brand">
            <img alt="branding logo" src="assets/img/logo-black.png" class="brand-logo">
            <div class="splitter"></div>
            <span class="subtitle">FERA Backoffice</span>
        </a>

        <ul id="mainMenu" class="list-unstyled components">
            <li>
                <a [routerLink]="['/backoffice']" class="nav-link">
                    <span class="lnr lnr-home"></span>
                    <span>Home</span>
                </a>
            </li>

            <li>
                <a [routerLink]="['/backoffice/content']" class="nav-link">
                    <span class="lnr lnr-book"></span>
                    <span>e-Presenter</span>
                </a>
            </li>
        </ul>

    </aside>

    <div id="content">
        <button id="menuClose" class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation" style="display:none;">
            <span class="navbar-toggler-icon lnr lnr-cross"></span>
        </button>

        <nav class="navbar navbar-expand-md navbar-white fixed-top head-nav">
            <button id="sidebarCollapse" class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon lnr lnr-menu"></span>
            </button>

            <a [routerLink]="['/backoffice']" class="navbar-brand fix-center">
                <img alt="branding logo" src="assets/img/logo-black.png" class="brand-logo">
                <div class="splitter"></div>
                <span class="subtitle">FERA Backoffice</span>
            </a>

            <ul class="nav navbar-nav float-xs-right">
                <li class="dropdown nav-item">

                    <a href="#" id="ddmUser" class="dropdown-toggle nav-link" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <span class="user-name" style="margin-top:13%;">Hello, {{user?.name}}</span>
                        <span class="lnr lnr-user" style="font-size: 18pt;"></span>
                    </a>

                    <div class="dropdown-menu dropdown-menu-right" aria-labelledby="ddmUser">
                        <a [routerLink]="['/backoffice/profile']" class="dropdown-item"><i class="icon-power3"></i> My profile</a>
                        <a href="javascript:void(0);" class="dropdown-item" (click)="logout($event)"><i class="icon-power3"></i> Logout</a>
                    </div>

                </li>
            </ul>
        </nav>

        <router-outlet></router-outlet>
    </div>

</div>
